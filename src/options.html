<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsTitle">MIT Lecture Study Sidebar Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings-shell">
      <section class="settings-card">
        <p class="settings-kicker" data-i18n="appShortName">MIT Lecture Study</p>
        <h1 data-i18n="optionsHeading">Extension Settings</h1>
        <p class="settings-copy" data-i18n="optionsIntro"></p>

        <form id="settings-form" class="settings-form">
          <label class="settings-checkbox">
            <input name="autoAnalyze" type="checkbox" />
            <span data-i18n="autoAnalyzeLabel">Auto-analyze lecture videos</span>
            <small data-i18n="autoAnalyzeHelp"></small>
          </label>

          <label>
            <span data-i18n="deepseekApiKey">DeepSeek API Key</span>
            <input name="deepseekApiKey" type="password" placeholder="sk-..." autocomplete="off" />
          </label>

          <label>
            <span data-i18n="deepseekBaseUrl">DeepSeek Base URL</span>
            <input name="deepseekBaseUrl" type="url" placeholder="https://api.deepseek.com" />
          </label>

          <label>
            <span data-i18n="deepseekModel">Model</span>
            <input name="deepseekModel" type="text" placeholder="deepseek-v4-flash" />
          </label>

          <label>
            <span data-i18n="visualScanInterval">Visual scan interval</span>
            <input name="visualScanIntervalSeconds" type="number" min="5" max="300" step="5" />
            <small data-i18n="visualScanIntervalHelp"></small>
          </label>

          <section class="settings-directory-card">
            <div>
              <span data-i18n="localSaveDirectory">Local save directory</span>
              <small data-i18n="localSaveDirectoryHelp"></small>
            </div>
            <div class="settings-directory-actions">
              <button type="button" id="choose-save-directory" class="secondary" data-i18n="chooseDirectory">Choose Directory</button>
              <button type="button" id="clear-save-directory" class="ghost" data-i18n="clear">Clear</button>
            </div>
            <p id="save-directory-status" data-i18n="directoryNotSelected">No directory selected</p>
          </section>

          <label>
            <span data-i18n="localSaveDirectoryStatus">Local save directory status</span>
            <input name="localSaveDirectoryName" type="text" readonly data-i18n-placeholder="directoryPlaceholder" placeholder="Not selected" />
            <small data-i18n="localSaveDirectoryStatusHelp"></small>
          </label>

          <label>
            <span data-i18n="interfaceLanguage">Interface language</span>
            <select name="uiLanguage">
              <option value="auto" data-i18n="languageAuto">Follow browser</option>
              <option value="zh-CN" data-i18n="languageChinese">中文</option>
              <option value="en" data-i18n="languageEnglish">English</option>
            </select>
          </label>

          <label>
            <span data-i18n="outputLanguage">Output language</span>
            <select name="outputLanguage">
              <option value="auto" data-i18n="outputLanguageAuto">Follow interface</option>
              <option value="zh-CN" data-i18n="languageChinese">中文</option>
              <option value="en" data-i18n="languageEnglish">English</option>
            </select>
          </label>

          <label>
            <span data-i18n="noteTone">Note style</span>
            <select name="noteTone">
              <option value="study-handout" data-i18n="noteToneStudyHandout">Study handout</option>
              <option value="structured-outline" data-i18n="noteToneStructuredOutline">Structured outline</option>
              <option value="review-notes" data-i18n="noteToneReviewNotes">Review notes</option>
            </select>
          </label>

          <label>
            <span data-i18n="sidebarWidth">Sidebar width</span>
            <input name="sidebarWidth" type="number" min="420" max="980" step="10" />
          </label>

          <div class="settings-actions">
            <button type="submit" data-i18n="saveSettings">Save Settings</button>
            <button type="button" id="test-connection" class="secondary" data-i18n="testDeepSeek">Test DeepSeek</button>
            <span id="settings-status"></span>
          </div>
        </form>
      </section>
    </main>
    <script src="i18n.js"></script>
    <script type="module" src="options.js"></script>
  </body>
</html>
